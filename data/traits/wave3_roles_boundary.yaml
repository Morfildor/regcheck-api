traits:
- id: access_reader_role
  label: Access reader role
  description: Reads credentials, badges, tokens, or identifiers for entry-control or building-access workflows.
  aliases:
  - access reader role
  - badge reader
  - card reader
  - access reader
  examples: []
  regex:
  - \baccess[ -]?reader(?:[ -]?role)?\b
  - \bbadge[ -]?reader\b
  - \bcard[ -]?reader\b
  normalized_to: access_reader_role
  normalization_priority: 0
- id: battery_storage_system
  label: Battery storage system
  description: Stores energy in a battery pack or cabinet as part of a wider home, building, or backup-power system.
  aliases:
  - battery storage
  - battery energy storage
  - home battery
  - residential battery storage
  examples: []
  regex:
  - \bbattery[ -]?storage(?:[ -]?system)?\b
  - \bbattery[ -]?energy[ -]?storage\b
  - \bhome[ -]?battery\b
  - \bresidential[ -]?battery[ -]?storage\b
  normalized_to: battery_storage_system
  normalization_priority: 0
- id: beverage_service
  label: Beverage service
  description: Dispenses, portions, heats, cools, or serves beverages as part of normal use.
  aliases:
  - beverage service
  - drink dispensing
  examples: []
  regex:
  - \bbeverage[ -]?service\b
  - \bdrink[ -]?dispensing\b
  normalized_to: beverage_service
  normalization_priority: 0
- id: body_treatment_boundary
  label: Body-treatment boundary
  description: Uses heat, light, stimulation, or similar body-treatment mechanisms that may need extra wellness, cosmetic, or medical-boundary review.
  aliases:
  - body treatment boundary
  - cosmetic treatment boundary
  - therapy boundary
  examples: []
  regex:
  - \bbody[ -]?treatment[ -]?boundary\b
  - \bcosmetic[ -]?treatment[ -]?boundary\b
  - \btherapy[ -]?boundary\b
  normalized_to: body_treatment_boundary
  normalization_priority: 0
- id: agricultural_special_use_boundary
  label: Agricultural / special-use boundary
  description: Sits in agricultural, livestock, fencing, or other special-use electrical scope where ordinary consumer routes may overcommit.
  aliases:
  - agricultural special use boundary
  - livestock equipment boundary
  - fencing equipment boundary
  examples: []
  regex:
  - \bagricultural[ -]?special[ -]?use[ -]?boundary\b
  - \blivestock[ -]?equipment[ -]?boundary\b
  - \bfencing[ -]?equipment[ -]?boundary\b
  normalized_to: agricultural_special_use_boundary
  normalization_priority: 0
- id: conference_audio
  label: Conference audio
  description: Captures or reproduces meeting-room voice audio for conferencing, speakerphone, or collaboration use.
  aliases:
  - conference audio
  - speakerphone
  - conferencing audio
  examples: []
  regex:
  - \bconference[ -]?audio\b
  - \bspeakerphone\b
  - \bconferencing[ -]?audio\b
  normalized_to: conference_audio
  normalization_priority: 0
- id: creator_equipment
  label: Creator equipment
  description: Supports content creation, streaming, studio, or recording workflows rather than ordinary household appliance use.
  aliases:
  - creator equipment
  - studio equipment
  - content creation gear
  examples: []
  regex:
  - \bcreator[ -]?equipment\b
  - \bstudio[ -]?equipment\b
  - \bcontent[ -]?creation(?:[ -]?gear)?\b
  normalized_to: creator_equipment
  normalization_priority: 0
- id: energy_system_boundary
  label: Energy-system boundary
  description: Sits within a wider charging, backup-power, solar, storage, or energy-management system and may need installation/system-boundary review.
  aliases:
  - energy system boundary
  - inverter boundary
  - storage boundary
  examples: []
  regex:
  - \benergy[ -]?system[ -]?boundary\b
  - \binverter[ -]?boundary\b
  - \bstorage[ -]?boundary\b
  normalized_to: energy_system_boundary
  normalization_priority: 0
- id: germicidal_emission
  label: Germicidal emission
  description: Intentionally emits germicidal optical radiation for disinfection, sanitizing, or antimicrobial treatment.
  aliases:
  - germicidal emission
  - germicidal lamp
  - disinfecting light
  examples: []
  regex:
  - \bgermicidal[ -]?emission\b
  - \bgermicidal[ -]?lamp\b
  - \bdisinfect(?:ing|ion)[ -]?(?:light|lamp)\b
  normalized_to: germicidal_emission
  normalization_priority: 0
- id: industrial_installation_boundary
  label: Industrial-installation boundary
  description: Looks like a fixed-installation, panel, cabinet, or professional building-system component rather than an ordinary consumer end product.
  aliases:
  - industrial installation boundary
  - professional installation boundary
  - panel installation boundary
  examples: []
  regex:
  - \bindustrial[ -]?installation[ -]?boundary\b
  - \bprofessional[ -]?installation[ -]?boundary\b
  - \bpanel[ -]?installation[ -]?boundary\b
  normalized_to: industrial_installation_boundary
  normalization_priority: 0
- id: intrusion_detection
  label: Intrusion detection
  description: Detects break-in, forced entry, glass-break, tamper, or similar intrusion/security events.
  aliases:
  - intrusion detection
  - break in detection
  - glass break detection
  examples: []
  regex:
  - \bintrusion[ -]?detection\b
  - \bbreak[ -]?in[ -]?detection\b
  - \bglass[ -]?break[ -]?detection\b
  normalized_to: intrusion_detection
  normalization_priority: 0
- id: inverter_system
