  normalization_priority: 0
- id: wireless_communication
  label: Wireless communication
  description: Uses a wireless data/radio interface (Wi-Fi, Bluetooth, Zigbee, Thread, NFC, cellular, etc.) for control or data transfer, distinct from wireless power transfer.
