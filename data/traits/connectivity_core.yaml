  - password
  - pin
  - passcode
  - credential
  - mfa
  - log in
  - passkey
  - 2fa
  examples:
  - password
  - pin
  - passcode
  - log in
  - passkey
  - 2fa
  regex:
  - \bauthentication\b
  - \bpassword\b
  - \bpin\b
  - \bpasscode\b
  - \bcredential\b
  - \bmfa\b
  - \blog[ -]?in\b
  - \bpasskey\b
  - \b2fa\b
  normalized_to: authentication
  normalization_priority: 0
