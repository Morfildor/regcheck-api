traits:
- id: account
  label: User account / profile
  description: Requires, supports, or stores a user account, customer profile, login identity, or app-bound user record.
  aliases:
  - account
  - login account
  - user profile
  - sign in
  - account required
  - create account
  - sign up
  examples:
  - login account
  - user profile
  - sign in
  - account required
  - create account
  regex:
  - \baccount\b
  - \blogin[ -]?account\b
  - \buser[ -]?profile\b
  - \bsign[ -]?in\b
  - \baccount[ -]?required\b
  - \bcreate[ -]?account\b
  - \bsign[ -]?up\b
  normalized_to: account
  normalization_priority: 0
- id: account_required
  label: Account required
  description: Requires account creation, login, or profile setup for core or marketed functions.
  aliases:
  - account required
  - login required
  examples: []
  regex:
  - \baccount[ -]?required\b
  - \blogin[ -]?required\b
  normalized_to: account_required
  normalization_priority: 0
- id: authentication
  label: Authentication
