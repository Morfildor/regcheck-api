boundaries:
  - id: power_system_installation
    boundary_class: power_system
    label: Power-system / inverter / storage boundary
    priority: 100
    preferred_route_anchor: power_system_boundary
    families_any:
      - energy_power_system
    genres_any:
      - energy_power_system
    traits_any:
      - energy_system_boundary
    boundary_tags_any:
      - energy_system_boundary
    add_boundary_tags:
      - energy_system_boundary
      - industrial_installation_boundary
    max_match_stage: family
    confidence_cap: low
    key_missing_differentiators:
      - system architecture
      - inverter or storage role
      - utility or fixed-installation context
    concise_reason: Energy-system signals indicate a fixed-installation or inverter/storage boundary case.

  - id: specialty_agricultural
