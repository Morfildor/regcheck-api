- code: 2017/1357
  title: Implementing Decision restricting EN 60335-2-9 reference publication
  family: Harmonised standards restriction
  legal_form: Implementing Decision
  priority: informational
  directive_key: LVD
  applicability: conditional
  reason: Relevant only where the product relies on EN 60335-2-9 route for grills/toasters/similar portable cooking appliances.
  triggers:
  - toaster / grill style product
  doc_impacts:
  - harmonised-standard presumption review
  notes: Treat as a standards-publication caveat, not as a standalone CE sector legislation.
  any_of_product_types:
  - toaster
  - portable_grill
