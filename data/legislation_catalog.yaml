- code: (EU) 2022/30 as amended by (EU) 2023/2444
  title: RED DA Cybersecurity
  family: Cybersecurity for radio equipment
  legal_form: Delegated Regulation
  priority: product_specific
  directive_key: RED_CYBER
  bucket: ce
  applicability: applicable
  applicable_from: '2025-08-01'
  reason: Review under the RED delegated cybersecurity regime where radio equipment is internet-connected, app-connected, uses networked software features, requires account or authentication controls, or supports monetary transactions.
  triggers:
  - internet-connected radio equipment
  - radio equipment with OTA, cloud, or other networked software functions
  - radio equipment with account, login, password, PIN, or authentication controls
  - radio equipment supporting payments, subscriptions, ordering, or other monetary-value transfer
  doc_impacts:
  - EU Declaration of Conformity
  - cybersecurity evidence
  - EN 18031 part mapping
  - technical documentation
  notes: Treat separately from CRA. Map current RED delegated-act scope to EN 18031-1, -2, and -3 based on network, authentication, and monetary-function features.
  all_of_traits:
  - radio
  any_of_traits:
  - internet
  - wifi
  - cloud
  - ota
  - app_control
  - cellular
  - account
  - authentication
  - monetary_transaction
