- code: 2023/1542/EU
  title: Batteries Regulation
  family: Batteries
  legal_form: Regulation
  priority: conditional
  directive_key: BATTERY
  bucket: non_ce
  applicability: conditional
  reason: Battery Regulation obligations should be reviewed where the product contains, is supplied with, or relies on batteries.
    The detailed obligation set depends on battery category such as portable, LMT, SLI, industrial, or EV battery.
  triggers:
  - battery-powered product
  - product supplied with batteries
  - battery sold as a standalone product
  doc_impacts:
  - battery labelling review
  - battery documentation review
  - removability and replaceability review where relevant
  - category classification review
  - end-of-life and EPR review
  any_of_traits:
  - battery_powered
  notes: Handle battery-as-component separately from battery-as-product. Portable consumer products will usually trigger portable-battery
    review; e-bikes and e-scooters may trigger LMT review; larger stationary or traction packs may move to industrial or EV
    categories.
  none_of_traits:
  - fixed_installation
  required_any_traits_normalized:
  - battery_powered
  required_all_traits_normalized: []
  excluded_traits_normalized: []
  evidence_keywords:
  - battery-powered product
  - product supplied with batteries
  - battery sold as a standalone product
  - battery labelling review
  - battery documentation review
  - removability and replaceability review where relevant
  - category classification review
