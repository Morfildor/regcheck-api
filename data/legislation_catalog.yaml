legislations:
- code: 2014/35/EU
  title: Low Voltage Directive
  family: Electrical safety
  legal_form: Directive
  priority: core
  directive_key: LVD
  bucket: ce
  applicability: applicable
  reason: Electrical equipment within LVD-type voltage domain is indicated.
  triggers:
  - electrical
  - mains_powered or mains_power_likely
  doc_impacts:
  - EU DoC
  - technical documentation
  - risk analysis
  - safety test evidence
  all_of_traits:
  - electrical
  any_of_traits:
  - mains_powered
  - mains_power_likely

- code: 2014/30/EU
  title: EMC Directive
  family: Electromagnetic compatibility
  legal_form: Directive
  priority: core
  directive_key: EMC
  bucket: ce
  applicability: applicable
  reason: Electrical or electronic product likely generates or is affected by electromagnetic disturbance.
  triggers:
  - electrical or electronic product
  doc_impacts:
  - EU DoC
  - EMC assessment
  - test reports
  - technical documentation
  any_of_traits:
  - electrical
  - electronic

- code: 2014/53/EU
  title: Radio Equipment Directive
  family: Radio
  legal_form: Directive
  priority: core
  directive_key: RED
  bucket: ce
  applicability: applicable
  reason: Radio functionality is present.
  triggers:
  - radio
