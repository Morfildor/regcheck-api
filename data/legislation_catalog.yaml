  - radio test evidence
  - EMC under RED
  - RF exposure assessment
  all_of_traits:
  - radio
- code: (EU) 2022/30 as amended by (EU) 2023/2444
  title: RED Delegated Act on cybersecurity, privacy and fraud protection
  family: Cybersecurity for radio equipment
  legal_form: Delegated Regulation
  priority: product_specific
  directive_key: RED_CYBER
  applicability: applicable
  reason: Connected radio features indicate RED cybersecurity/privacy/fraud scoping.
  triggers:
  - radio plus connected/privacy/payment-like features
  doc_impacts:
  - EU DoC
  - cybersecurity evidence
  - EN 18031 mapping
  - technical documentation
  notes: Use as RED delegated act logic; not CRA.
  all_of_traits:
  - radio
  any_of_traits:
  - internet
  - cloud
  - app_control
  - ota
  - account
  - authentication
  - camera
  - microphone
  - location
  - child_targeted
  - health_related
  - personal_data_likely
