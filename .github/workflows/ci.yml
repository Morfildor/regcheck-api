name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy app

      - name: Run pytest
        run: pytest

      - name: Benchmark Regression Gate
        run: pytest tests/test_benchmark_suite.py

      - name: Snapshot Drift Gate
        run: pytest tests/test_backend_hardening.py -k api_snapshots_remain_stable_for_representative_products

      - name: Route Drift Gate
        run: pytest tests/test_routing_regression.py tests/test_matching_regressions.py

      - name: Standards Drift Gate
        run: pytest tests/test_rulegrid_pass2_regression.py tests/test_red_routing.py
